version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.11"
  apt_packages:
    - pandoc
  jobs:
    post_checkout:
      # Full history is required for dunamai to calculate the version
      - git fetch --unshallow || true
    post_create_environment:
      # Install uv for dependency management
      - pip install uv
    post_install:
      # Install dependencies with 'docs' dependency group using uv
      - uv sync --active --all-extras --group docs

sphinx:
  builder: html
  configuration: docs/conf.py
