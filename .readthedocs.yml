version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.11"
  apt_packages:
    - pandoc
  jobs:
    post_checkout:
      # Full history is required for dunamai to calculate the version
      - git fetch --unshallow || true
    post_create_environment:
      - pip install uv
    post_install:
      - uv pip install -e ".[anndata,cell-locations]"
      - uv export --group docs --no-hashes --no-emit-project | uv pip install -r -

sphinx:
  builder: html
  configuration: docs/conf.py
