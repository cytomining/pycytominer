---
name: Release Drafter

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  update-release-draft:
    name: Update release draft
    runs-on: ubuntu-24.04
    steps:
      - name: Update release draft
        uses: release-drafter/release-drafter@v7.4.0
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
