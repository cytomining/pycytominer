name: Publish Python 🐍 distributions 📦 to PyPI and TestPyPI
on:
  release:
    # only publish to pypi when gh release is published
    types: [published]

env:
  LANG: "en_US.utf-8"
  LC_ALL: "en_US.utf-8"
  PYTHONIOENCODING: "UTF-8"
  TARGET_PYTHON_VERSION: "3.10"

jobs:
  build-and-publish:
    name: Build and publish Python 🐍 distributions
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      contents: read
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          # Full history is required for setuptools-scm to derive the version
          # from the published release tag.
          fetch-depth: 0
      - name: Setup base environment
        uses: ./.github/actions/setup-env
        with:
          python-version: ${{ env.TARGET_PYTHON_VERSION }}
          cache-pre-commit: false
          cache-venv: false
          setup-uv: true
          install-deps: false
      - name: Build 📦 distributions
        run: |
          uv build
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
